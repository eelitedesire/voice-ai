# Nginx reverse proxy for the Voice AI app on the existing host (solarautopilotnginx).
# Use this INSTEAD of deploy/Caddyfile if Nginx already owns :443 on this box.
#
# Install:
#   sudo cp deploy/nginx-buyafraction.conf /etc/nginx/sites-available/buyafraction.com
#   sudo ln -s /etc/nginx/sites-available/buyafraction.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: obtain a cert for buyafraction.com (see DEPLOY.md — note only :443 is
# exposed publicly, so HTTP-01 on :80 may not be reachable from the internet;
# use DNS-01 or an existing wildcard cert).

# Maps the Upgrade header so WebSocket connections (/ws/transcribe) are proxied.
# This directive belongs in the http{} context — if your nginx splits config
# into conf.d/, drop it there once (e.g. /etc/nginx/conf.d/ws_upgrade.conf)
# rather than per-server.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name buyafraction.com www.buyafraction.com;

    # --- TLS: managed by certbot, or point at your existing cert ---
    # ssl_certificate     /etc/letsencrypt/live/buyafraction.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/buyafraction.com/privkey.pem;

    # Live transcription sessions are long-lived; don't time them out.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Audio frames over the WebSocket; allow a comfortable body size.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for /ws/transcribe
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Optional :80 -> :443 redirect (only useful if port 80 is reachable here).
server {
    listen 80;
    listen [::]:80;
    server_name buyafraction.com www.buyafraction.com;
    return 301 https://$host$request_uri;
}
