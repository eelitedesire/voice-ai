# Nginx reverse proxy for the Voice AI app on solarautopilotnginx.
#
# TLS model on this host: an edge (Cloudflare-style) terminates real TLS and
# connects back to this origin, which presents the self-signed "snakeoil" cert —
# the same pattern the solarautopilot.com vhost uses. So no Let's Encrypt cert is
# needed here. (If clients ever hit this origin directly, swap in a real cert.)
#
# Install:
#   sudo cp deploy/nginx-buyafraction.conf /etc/nginx/sites-available/buyafraction
#   sudo ln -s /etc/nginx/sites-available/buyafraction /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Maps the Upgrade header so WebSocket connections (/ws/transcribe) are proxied.
# Must be in http{} context and defined only ONCE across all nginx configs —
# check first:  sudo grep -rn 'map \$http_upgrade' /etc/nginx/
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name buyafraction.com www.buyafraction.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name buyafraction.com www.buyafraction.com;

    # Self-signed origin cert; real TLS is terminated at the edge.
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    # Live transcription sessions are long-lived; don't time them out.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for /ws/transcribe
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
